# harness.toml - Harness 流水线结构化配置文件（精简版）
# 该文件与 AGENT.md 互补：AGENT.md 是规则契约，harness.toml 是机器可解析的配置参数。

[project]
name = "微信公众号推送-harness"
description = "微信公众号 AI 技术内容生产 Harness 流水线（v2.1 审稿修订版）"
version = "2.1.0"

[pipeline]
# v2.1 流水线参数
# agent.py 直接抓取 5 篇候选（GitHub 最多 2，其他至少 3）
# writer 逐篇 AI 评估质量 + 生成 MD
# 审稿 Agent 独立评审 → 不通过则修改 → 再审（最多 N 轮）
default_days = 10
target_article_count = 5
max_github = 2
min_non_github = 3

# 输出目录
reports_dir = "reports"
paper_dir = "daily_paper"
errors_dir = "errors"
states_dir = "states"

[focus_topics]
# 关注领域列表（需与 AGENT.md 保持一致）
topics = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
]

[focus_topics.aliases]
"AI Agent" = ["Agentic AI", "Multi-Agent", "智能体"]
"AI Coding" = ["Codex", "Claude Code", "GitHub Copilot", "Copilot"]
"MCP" = ["Model Context Protocol"]

[valid_categories]
categories = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
    "其他",
]

[llm]
# LLM 写作器默认配置（写作 Agent）
default_model = ""
default_temperature = 0.45
default_max_tokens = 4096
max_retries = 3
request_timeout = 240
revision_max_attempts = 0
max_original_chars = 120000

# 审稿 Agent 配置（独立于写作 Agent，使用 REVIEW_LLM_* 环境变量）
review_max_rounds = 3
review_pass_score = 75

# AI 质量评估配置
quality_evaluation = true
quality_eval_temperature = 0.2
quality_eval_max_tokens = 200

[article]
# 文章生成约束
min_char_count = 1200
max_char_count = 3000
min_h2_count = 3
min_score_for_publish = 75
max_paragraph_chars = 170
min_sentence_chars = 24
max_sentence_chars = 180

[fetch]
# 抓取配置
wechat_sogou_delay = 1.0   # 搜狗微信搜索请求间隔（秒）
article_fetch_delay = 0.5  # 文章原文抓取间隔（秒）
fetch_timeout = 20         # 抓取超时（秒）
