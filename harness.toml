# harness.toml - Harness 流水线结构化配置文件
# 该文件与 AGENT.md 互补：AGENT.md 是规则契约，harness.toml 是机器可解析的配置参数。
# 代码应从此文件读取参数，而非硬编码在模块中。

[project]
name = "微信公众号推送-harness"
description = "微信公众号 AI 技术内容生产 Harness 流水线"
version = "1.0.0"

[pipeline]
# 默认流水线参数
default_days = 10
default_limit = 10
default_article_count = 5
min_article_count = 3
max_article_count = 5

# 输出目录
reports_dir = "reports"
paper_dir = "daily_paper"
errors_dir = "errors"
states_dir = "states"

[focus_topics]
# 关注领域列表（需与 AGENT.md 保持一致）
topics = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
]

# 每个领域涵盖的关键主题/公司（用于抓取关键词匹配，非独立领域）
[focus_topics.aliases]
"AI Agent" = ["Agentic AI", "Multi-Agent", "智能体"]
"AI Coding" = ["Codex", "Claude Code", "GitHub Copilot", "Copilot"]
"MCP" = ["Model Context Protocol"]

[valid_categories]
# 有效分类列表（需与 verify.py 保持一致）
categories = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
    "其他",
]

[dedupe]
# 去重策略配置
source_cap = 3           # 单来源最多收录条数
min_relevance = 3        # 最低相关度阈值
two_round_strategy = true # 两轮去重：先限来源再放宽

[llm]
# LLM 写作器默认配置
default_model = ""       # 留空则从 LLM_MODEL 环境变量读取
default_temperature = 0.45
default_max_tokens = 4096
max_retries = 3
request_timeout = 240
revision_max_attempts = 1
max_original_chars = 120000

[article]
# 文章生成约束
min_char_count = 1200
max_char_count = 3000
min_h2_count = 3
min_score_for_publish = 75
max_paragraph_chars = 170
min_sentence_chars = 24
max_sentence_chars = 180
