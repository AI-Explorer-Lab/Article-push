# harness.toml - Harness 流水线结构化配置文件（精简版）
# 该文件与 AGENT.md 互补：AGENT.md 是规则契约，harness.toml 是机器可解析的配置参数。

[project]
name = "微信公众号推送-harness"
description = "微信公众号 AI 技术内容生产 Harness 流水线（v2.4 质量增强版）"
version = "2.4.0"

[pipeline]
# v2.4 流水线参数
# agent.py 直接抓取 5 篇候选（GitHub 最多 2，其他至少 3）
# writer 直接从 report JSON 读取，内嵌类型推断和路径生成（无 deepread 中间层）
# v2.4 质量增强：
#   - summary: LLM 生成 80-120 字中文摘要（替代截断前100字符）
#   - insight: LLM 基于原文生成独立判断（替代硬编码模板）
#   - classify: LLM 语义分类（替代关键词匹配）
#   - writer prompt: 精简指令，减少模板腔引导
#   - polish: 不再粗暴删除正常连接词
# 审稿修订循环（最多 N 轮，门槛 65 分）：
#   - 逐轮调整修改策略：温和 → 强化 → 强力重构
#   - 退化检测：评分连续 3 轮下降 → 提前终止
#   - 每篇文章独立追踪评分历史
default_days = 10
target_article_count = 5
max_github = 2
min_non_github = 3

# 输出目录
reports_dir = "reports"
paper_dir = "daily_paper"
errors_dir = "errors"
states_dir = "states"

[focus_topics]
# 关注领域列表（需与 AGENT.md 保持一致）
topics = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
]

[focus_topics.aliases]
"AI Agent" = ["Agentic AI", "Multi-Agent", "智能体"]
"AI Coding" = ["Codex", "Claude Code", "GitHub Copilot", "Copilot"]
"MCP" = ["Model Context Protocol"]

[valid_categories]
categories = [
    "AI Agent",
    "Harness Engineering",
    "Context Engineering",
    "MCP",
    "LLM推理与优化",
    "多模态大模型",
    "AI Coding",
    "Vibe Coding",
    "其他",
]

[llm]
# LLM 写作器默认配置（写作 Agent）
default_model = ""
default_temperature = 0.45
default_max_tokens = 4096
max_retries = 3
request_timeout = 240
revision_max_attempts = 0
max_original_chars = 120000

# 审稿修订配置（独立于写作 Agent）
# review_max_rounds: 每篇文章最多审稿→修改→再审的轮数（默认 3）
#   - 第 1 轮: gentle 温和修改 (temperature 0.5)
#   - 第 2 轮: moderate 强化修改 (temperature 0.7)
#   - 第 3+ 轮: aggressive 强力重构 (temperature 0.8)
# review_pass_score: 审稿通过的最低分数（0-100）
# review_degraded_threshold: 退化检测——连续多少轮评分下降则提前终止（默认 3）
review_max_rounds = 3
review_pass_score = 65
review_degraded_threshold = 3

# 日志分析 Agent 配置（独立于写作/审稿 Agent，使用 LOG_ANALYZER_LLM_* 环境变量）
# 当已知坑位规则未匹配时，自动调用 LLM 分析失败日志并给出沉淀建议
# 若未配置 LOG_ANALYZER_LLM_*，则 fallback 到 LLM_*；都不可用则不启用 LLM 分析
log_analyzer_enabled = true
log_analyzer_max_input_chars = 8000

# AI 质量评估配置
quality_evaluation = true
quality_eval_temperature = 0.2
quality_eval_max_tokens = 200

[article]
# 文章生成约束
min_char_count = 1200
max_char_count = 3000
min_h2_count = 3
min_score_for_publish = 65
max_paragraph_chars = 170
min_sentence_chars = 24
max_sentence_chars = 180

[fetch]
# 抓取配置
wechat_sogou_delay = 1.0   # 搜狗微信搜索请求间隔（秒）
article_fetch_delay = 0.5  # 文章原文抓取间隔（秒）
fetch_timeout = 20         # 抓取超时（秒）
